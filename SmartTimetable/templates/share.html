{% extends 'base.html' %}

{% block page_title %}Share Timetable{% endblock %}

{% block content %}
<section class="glass-card p-4 mt-3">
    <h4 class="section-title">Share Timetable</h4>
    <p class="section-subtitle">Use this link to share generation {{ generation_id }} with stakeholders.</p>

    <div class="share-box mt-3">
        <input id="shareInput" class="form-control custom-input" type="text" value="{{ share_url }}" readonly>
        <button class="btn btn-soft" type="button" id="copyShareBtn" data-copy-target="shareInput">
            <i class="fa-solid fa-copy me-1"></i>Copy Link
        </button>
    </div>

    <div class="d-flex flex-wrap gap-2 mt-3">
        <a class="btn btn-outline-light" href="{{ url_for('view_timetable', generation_id=generation_id) }}">Open Timetable</a>
        <a class="btn btn-outline-light" href="{{ url_for('published_page', generation_id=generation_id) }}">Back to Published</a>
    </div>
</section>
{% endblock %}
